server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Long-cache immutable assets (Vite outputs hashed filenames under /assets).
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html must never be cached — deploys change its script refs.
    location = /index.html {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Cheap liveness probe.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # SPA fallback.
    location / {
        try_files $uri /index.html;
    }

    # Security headers (tighten per your CSP policy before public launch).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
