[project]
name = "alloy-shared"
version = "0.0.0"
description = "Shared Pydantic schemas for Alloy (AppSpec, BuildPlan, ToolCall)."
requires-python = ">=3.12,<4.0"
dependencies = ["pydantic>=2.9.0,<3.0.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["alloy_shared"]
